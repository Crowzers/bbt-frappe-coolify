# ============================================================
# Frappe BBT - Custom Image pentru Coolify
# Imaginie: ghcr.io/crowzers/bbt-frappe-coolify
# Domeniu: desk.beanbagtheory.ro
# ============================================================
#
# VARIABILE ENVIRONMENT in Coolify UI:
#   FRAPPE_IMAGE        → ghcr.io/crowzers/bbt-frappe-coolify
#   FRAPPE_VERSION      → latest
#   SERVICE_PASSWORD_DB → auto-generat
#   SERVICE_PASSWORD_ADMIN → auto-generat
#   SITES_JSON_BASE64   → base64 din sites.json (vezi mai jos)
#
# Pentru SITES_JSON_BASE64, ruleaza pe VPS:
#   echo '[{"name":"desk.beanbagtheory.ro","apps":["crm","helpdesk","insights","telephony","frappe_whatsapp"],"default":true}]' | base64 -w 0
# ============================================================

services:
  configure:
    image: "${FRAPPE_IMAGE}:${FRAPPE_VERSION:-latest}"
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - >-
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host db;
        bench set-config -gp db_port 3306;
        bench set-config -g redis_cache "redis://redis-cache:6379";
        bench set-config -g redis_queue "redis://redis-queue:6379";
        bench set-config -g redis_socketio "redis://redis-queue:6379";
        bench set-config -gp socketio_port 9000;
        bench set-config -g http_timeout 300;
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  create-site:
    image: "${FRAPPE_IMAGE}:${FRAPPE_VERSION:-latest}"
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - |-
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        SITES_JSON="/home/frappe/frappe-bench/sites.json"
        if [ -n "$$SITES_JSON_BASE64" ]; then
          echo "$$SITES_JSON_BASE64" | base64 -d > "$$SITES_JSON"
          echo "Decoded sites config from SITES_JSON_BASE64"
        elif [ ! -f "$$SITES_JSON" ]; then
          echo "Error: No SITES_JSON_BASE64 env var and no baked-in sites.json"
          exit 1
        else
          echo "Using baked-in sites.json"
        fi
        SITE_COUNT=$$(jq length "$$SITES_JSON")
        for i in $$(seq 0 $$((SITE_COUNT - 1))); do
          SITE_NAME=$$(jq -r ".[$$i].name" "$$SITES_JSON")
          IS_DEFAULT=$$(jq -r ".[$$i].default // false" "$$SITES_JSON")
          if [ ! -d "sites/$$SITE_NAME" ]; then
            INSTALL_APPS=$$(jq -r ".[$$i].apps[]" "$$SITES_JSON" | sed 's/^/--install-app /' | tr '\n' ' ')
            SITE_NUM=$$((i + 1))
            SITE_PWD_VAR="ADMIN_PASSWORD_$${SITE_NUM}"
            SITE_PWD=$$(eval echo "\$$$$SITE_PWD_VAR")
            SITE_PWD=$${SITE_PWD:-$$ADMIN_PASSWORD}
            echo "Creating site $$SITE_NAME..."
            bench new-site "$$SITE_NAME" \
              --mariadb-root-password "$$DB_ROOT_PASSWORD" \
              --db-root-username root \
              --admin-password "$$SITE_PWD" \
              --mariadb-user-host-login-scope "%" \
              $$INSTALL_APPS
            bench --site "$$SITE_NAME" set-config host_name "https://$$SITE_NAME"
            bench --site "$$SITE_NAME" enable-scheduler
          else
            echo "Site $$SITE_NAME already exists. Skipping."
          fi
          if [ "$$IS_DEFAULT" = "true" ]; then
            bench use "$$SITE_NAME"
          fi
        done
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      SITES_JSON_BASE64: "${SITES_JSON_BASE64}"
      ADMIN_PASSWORD: "${SERVICE_PASSWORD_ADMIN}"
      DB_ROOT_PASSWORD: "${SERVICE_PASSWORD_DB}"
    depends_on:
      configure:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy

  migrate:
    image: "${FRAPPE_IMAGE}:${FRAPPE_VERSION:-latest}"
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - bench --site desk.beanbagtheory.ro migrate
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      create-site:
        condition: service_completed_successfully

  backend:
    image: "${FRAPPE_IMAGE}:${FRAPPE_VERSION:-latest}"
    restart: unless-stopped
    command:
      - /home/frappe/frappe-bench/env/bin/gunicorn
      - --chdir=/home/frappe/frappe-bench/sites
      - --bind=0.0.0.0:8000
      - --threads=4
      - --workers=4
      - --worker-class=gthread
      - --worker-tmp-dir=/dev/shm
      - --timeout=300
      - --preload
      - frappe.app:application
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy

  frontend:
    image: "${FRAPPE_IMAGE}:${FRAPPE_VERSION:-latest}"
    restart: unless-stopped
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: desk.beanbagtheory.ro
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "300"
      CLIENT_MAX_BODY_SIZE: 100m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.frappe-bbt.rule=Host(`desk.beanbagtheory.ro`)
      - traefik.http.routers.frappe-bbt.entrypoints=https
      - traefik.http.routers.frappe-bbt.tls=true
      - traefik.http.routers.frappe-bbt.tls.certresolver=letsencrypt
      - traefik.http.services.frappe-bbt.loadbalancer.server.port=8080
    depends_on:
      backend:
        condition: service_healthy
      websocket:
        condition: service_started

  websocket:
    image: "${FRAPPE_IMAGE}:${FRAPPE_VERSION:-latest}"
    restart: unless-stopped
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      migrate:
        condition: service_completed_successfully

  queue-long:
    image: "${FRAPPE_IMAGE}:${FRAPPE_VERSION:-latest}"
    restart: unless-stopped
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      migrate:
        condition: service_completed_successfully

  queue-short:
    image: "${FRAPPE_IMAGE}:${FRAPPE_VERSION:-latest}"
    restart: unless-stopped
    command:
      - bench
      - worker
      - --queue
      - short,default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      migrate:
        condition: service_completed_successfully

  scheduler:
    image: "${FRAPPE_IMAGE}:${FRAPPE_VERSION:-latest}"
    restart: unless-stopped
    command:
      - bench
      - schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      migrate:
        condition: service_completed_successfully

  db:
    image: mariadb:10.6
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: "${SERVICE_PASSWORD_DB}"
      MARIADB_ROOT_PASSWORD: "${SERVICE_PASSWORD_DB}"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 20

  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:
